<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Votação - Signo</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
      <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Enquetes Disponíveis</h1>
        <button
          onclick="toggleModal()"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700"
        >
          + Nova Enquete
        </button>
      </header>

      <div id="polls-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <p class="text-gray-500">Carregando enquetes...</p>
      </div>
    </div>

    <div
      id="modal"
      class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <h2 class="text-xl font-bold mb-4">Criar Nova Enquete</h2>
        <form id="poll-form" class="space-y-4">
          <input
            type="text"
            id="title"
            placeholder="Título da Enquete"
            class="w-full border p-2 rounded"
            required
          />
          <div class="grid grid-cols-2 gap-2">
            <input
              type="datetime-local"
              id="start_date"
              class="border p-2 rounded"
              required
            />
            <input
              type="datetime-local"
              id="end_date"
              class="border p-2 rounded"
              required
            />
          </div>
          <div id="options-container" class="space-y-2">
            <input
              type="text"
              class="option-input w-full border p-2 rounded"
              placeholder="Opção 1"
              required
            />
            <input
              type="text"
              class="option-input w-full border p-2 rounded"
              placeholder="Opção 2"
              required
            />
            <input
              type="text"
              class="option-input w-full border p-2 rounded"
              placeholder="Opção 3"
              required
            />
          </div>
          <div class="flex justify-end gap-2 mt-4">
            <button
              type="button"
              onclick="toggleModal()"
              class="px-4 py-2 text-gray-600"
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="bg-green-600 text-white px-4 py-2 rounded"
            >
              Salvar Enquete
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
